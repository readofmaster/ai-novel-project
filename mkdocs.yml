site_name: AI Novel Project
site_url: https://readofmaster.github.io/ai-novel-project/
use_directory_urls: false
theme:
  name: material
  language: ja
  custom_dir: docs/stylesheets
  features:
    - navigation.tabs # ナビゲーションをヘッダーに配置
    - navigation.tabs.sticky
    - content.code.annotate
    - content.code.copy
  palette:
    primary: white
    accent: indigo

extra:
  font:
    text: "Yu Mincho"

extra_css:
  - stylesheets/extra.css

nav:
  - ホーム: index.md
  小説を読む:
    - 第1章: novel/chapter1.md
    - 第2章: novel/chapter2.md
  - あらすじ: PLOT.md
  - 進捗: PROGRESS.md
  - 執筆フロー: rules/NOVEL_WORKFLOW.md
 
