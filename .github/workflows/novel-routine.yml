name: Daily Novel Routine

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -U google-genai pyyaml
        
      - name: Get Feedback and Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR Comments
          PR_NUMBER=$(gh pr list --head daily-update --json number --jq '.[0].number' || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr view $PR_NUMBER --json comments --jq '.comments[].body' > feedback.txt
          else
            touch feedback.txt
          fi
          
          # Append Open Issues
          echo -e "\n\n--- Open Issues ---\n" >> feedback.txt
          gh issue list --json number,title,body --jq '.[] | "Issue #\(.number): \(.title)\n\(.body)\n---"' >> feedback.txt

      - name: Generate Content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_content.py
        
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Add daily novel content"
          branch: daily-update
          title: "デイリー小説更新"
          body: "AIによって自動生成された小説の執筆内容、編集者の指摘、読者の感想です。"
          token: ${{ secrets.GITHUB_TOKEN }}
